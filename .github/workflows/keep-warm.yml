name: Keep Render warm

# Pings the app so Render's free tier doesn't spin down (it sleeps after
# ~15 min of no inbound traffic; the cold restart takes ~30-50s).
#
# NOTE: GitHub's scheduled runs are best-effort and often delayed/skipped
# under load, so this is not a guarantee. For reliable warmth use a dedicated
# uptime pinger (UptimeRobot / cron-job.org) hitting /api/health every 5 min.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (GitHub may run it late)
  workflow_dispatch: {} # allow manual runs

# Don't pile up overlapping pings.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          URL: https://chorpolice.fun/api/health
        run: |
          for i in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 40 "$URL") \
              && echo "OK ($code) on attempt $i" && exit 0
            echo "attempt $i failed (waking up?), retrying in 15s..."
            sleep 15
          done
          echo "all attempts failed"
          exit 1
