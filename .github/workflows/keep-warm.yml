name: Keep Render warm

# Pings the app so Render's free tier doesn't idle-spin-down. GitHub cron is
# best-effort; a dedicated uptime pinger is more reliable.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          URL: https://chorpolice.fun/api/health
        run: |
          for i in 1 2 3; do
            code=$(curl -fsS -o /dev/null -w "%{http_code}" --max-time 40 "$URL") \
              && echo "OK ($code) on attempt $i" && exit 0
            echo "attempt $i failed (waking up?), retrying in 15s..."
            sleep 15
          done
          echo "all attempts failed"
          exit 1
